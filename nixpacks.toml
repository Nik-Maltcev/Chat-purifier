[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "python3", "python3Packages.pip"]

[phases.install]
cmds = [
  "pnpm install --no-frozen-lockfile",
  "pip install -r python-worker/requirements.txt"
]

[phases.build]
cmds = [
  "pnpm run typecheck:libs",
  "pnpm --filter @workspace/tg-chat-analyzer run build",
  "pnpm --filter @workspace/api-server run build",
  "mkdir -p artifacts/api-server/dist/public",
  "cp -r artifacts/tg-chat-analyzer/dist/* artifacts/api-server/dist/public/"
]

[start]
cmd = "pnpm --filter @workspace/db push && node artifacts/api-server/dist/index.mjs"
